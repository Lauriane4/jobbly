<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobbly — Suis tes candidatures</title>
    <link rel="icon" type="image/png" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        
        <!-- Logo -->
        <div class="logo">
            <span class="dot-purple"></span>
            <span class="dot-orange"></span>
            <h1>Jobbly</h1>
        </div>

        <p class="tagline">Suis tes candidatures intelligemment</p>

        <!-- Toggle -->
        <div class="toggle">
            <button id="btn-login" class="toggle-btn active" onclick="showLogin()">Se connecter</button>
            <button id="btn-register" class="toggle-btn" onclick="showRegister()">S'inscrire</button>
        </div>

        <!-- Formulaire login -->
        <form id="form-login">
            <input type="email" id="email-login" placeholder="Email" required />
            <input type="password" id="password-login" placeholder="Mot de passe" required />
            <button type="submit" class="btn-primary">Se connecter</button>
        </form>

        <!-- Formulaire register -->
        <form id="form-register" style="display: none;">
            <input type="text" id="firstname" placeholder="Prénom" required />
            <input type="email" id="email-register" placeholder="Email" required />
            <input type="password" id="password-register" placeholder="Mot de passe" required />
            <input type="password" id="password-confirm" placeholder="Confirmer le mot de passe" required />
            <button type="submit" class="btn-primary">Créer mon compte</button>
        </form>

    </div>
    <script src="authentification.js"></script>
</body>
</html>
