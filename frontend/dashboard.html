<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobbly — Dashboard</title>
    <link rel="stylesheet" href="dashboard.style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="dashboard-body">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <span class="dot-purple"></span>
            <span class="dot-orange"></span>
            <h1>Jobbly</h1>
        </div>
        <div class="nav-right">
            <span class="user-email" id="user-email">lauriane@email.com</span>
            <button class="btn-logout" id="btn-logout">Se déconnecter</button>
        </div>
    </nav>

    <!-- Contenu principal -->
    <main class="dashboard-main">

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">Total</p>
                <p class="stat-number" id="stat-total">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Postulé</p>
                <p class="stat-number purple" id="stat-applied">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Entretien</p>
                <p class="stat-number orange" id="stat-interview">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Offre</p>
                <p class="stat-number green" id="stat-offer">0</p>
            </div>
        </div>

        <!-- Header liste -->
        <div class="list-header">
            <h2>Mes candidatures</h2>
            <div style="display: flex; gap: 8px;">
            <button class="btn-export" onclick="exportExcel()">⬇ Exporter Excel</button>
            <button class="btn-orange" id="btn-add" onclick="openModal()">+ Ajouter</button>
        </div>
        </div>

        <!-- Liste des candidatures -->
        <div id="applications-list">
            <div class="empty-state">
                <p>Aucune candidature pour l'instant</p>
                <p class="empty-sub">Clique sur "+ Ajouter" pour commencer !</p>
            </div>
        </div>

    </main>

    <!-- Modal ajout candidature -->
    <div id="modal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3>Nouvelle candidature</h3>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <form id="form-application">
                <div class="form-row">
                    <div class="form-group">
                        <label>Entreprise *</label>
                        <input type="text" id="company" placeholder="ex: L'Oréal" required />
                    </div>
                    <div class="form-group">
                        <label>Poste *</label>
                        <input type="text" id="job-title" placeholder="ex: Product Manager" required />
                    </div>
                </div>
                <div class="form-row">
    <div class="form-group">
        <label>Domaine *</label>
        <select id="job-domain" onchange="updateSpecialties()">
            <option value="">-- Choisir --</option>
            <option value="tech">💻 Tech & IT</option>
            <option value="business">📊 Business & Management</option>
            <option value="finance">💰 Finance & Comptabilité</option>
            <option value="marketing">📣 Marketing & Communication</option>
            <option value="hospitality">🏨 Hôtellerie, Tourisme & Événementiel</option>
            <option value="law">⚖️ Droit & Juridique</option>
            <option value="health">🏥 Santé & Médical</option>
            <option value="engineering">🏗️ Ingénierie & Industrie</option>
            <option value="creative">🎨 Créatif & Design</option>
            <option value="education">🧑‍🏫 Éducation & Recherche</option>
            <option value="logistics">🌍 Logistique & Transport</option>
            <option value="environment">🌱 Environnement & Développement durable</option>
            <option value="commerce">🛍️ Commerce & Vente</option>
            <option value="public">🏛️ Secteur public & ONG</option>
            <option value="other">🔵 Autre</option>
        </select>
    </div>
    <div class="form-group" id="specialty-group">
        <label>Spécialité</label>
        <select id="job-specialty">
            <option value="">-- Choisir un domaine d'abord --</option>
        </select>
    </div>
</div>

<div class="form-group" id="other-group" style="display: none;">
    <label>Précise le domaine</label>
    <input type="text" id="other-domain" placeholder="ex: Agriculture, Sport..." />
</div>

<div class="form-row">
    <div class="form-group">
        <label>Statut</label>
        <select id="status">
            <option value="Postulé">Postulé</option>
            <option value="Entretien">Entretien</option>
            <option value="Offre">Offre</option>
            <option value="Refusé">Refusé</option>
            <option value="Sans réponse">Sans réponse</option>
        </select>
    </div>
</div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ville</label>
                        <input type="text" id="city" placeholder="ex: Paris" />
                    </div>
                    <div class="form-group">
                        <label>Pays</label>
                        <input type="text" id="country" placeholder="ex: France" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Salaire / Gratification</label>
                        <input type="text" id="salary" placeholder="ex: 1700€/mois" />
                    </div>
                    <div class="form-group">
                        <label>Date de candidature</label>
                        <input type="date" id="date-applied" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Lien de l'offre</label>
                    <input type="url" id="link" placeholder="https://..." />
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="notes" rows="3" placeholder="Remarques, contacts, prochaines étapes..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" onclick="closeModal()">Annuler</button>
                    <button type="submit" class="btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
